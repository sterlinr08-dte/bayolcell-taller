name: Armar BAYOL Diagnostic Engine (.exe)

# Genera el instalador de Windows automáticamente.
# - Botón manual: pestaña Actions -> "Armar BAYOL Diagnostic Engine (.exe)" -> Run workflow
# - O al publicar un tag que empiece con "bde-v" (ej. bde-v2.0.0): además crea un Release con el .exe

on:
  workflow_dispatch:
  push:
    tags:
      - 'bde-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: bde
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Empaquetar libimobiledevice (binarios de Windows) dentro del instalador
        continue-on-error: true
        timeout-minutes: 8
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          try {
            $url = "${{ vars.LIBIMOBILEDEVICE_URL }}"
            if ($url) {
              Write-Host "Descargando libimobiledevice desde LIBIMOBILEDEVICE_URL..."
              Invoke-WebRequest -Uri $url -OutFile libi.zip
              Expand-Archive -Path libi.zip -DestinationPath bin -Force
            } else {
              Write-Host "Descargando nuget.exe..."
              Invoke-WebRequest -Uri https://dist.nuget.org/win-x86-commandline/latest/nuget.exe -OutFile nuget.exe
              Write-Host "Instalando imobiledevice-net (binarios nativos de Windows)..."
              .\nuget.exe install imobiledevice-net -OutputDirectory nupkgs -ExcludeVersion -NonInteractive
              $native = Get-ChildItem -Path nupkgs -Recurse -Directory |
                Where-Object { $_.FullName -match 'runtimes\\win[0-9a-z-]*-x64\\native$' } |
                Select-Object -First 1
              if ($native) {
                Write-Host "Copiando binarios desde $($native.FullName)"
                New-Item -ItemType Directory -Force -Path bin | Out-Null
                Copy-Item "$($native.FullName)\*" -Destination bin -Recurse -Force
              } else {
                Write-Host "AVISO: no se encontro la carpeta native win-x64 en el paquete."
              }
            }
            Write-Host "=== Contenido de bin/ ==="
            Get-ChildItem -Recurse bin | Select-Object FullName, Length | Format-Table -AutoSize
            if (Test-Path "bin\ideviceinfo.exe") { Write-Host "RESULTADO: OK - ideviceinfo.exe empaquetado." }
            else { Write-Host "RESULTADO: AVISO - no se encontro ideviceinfo.exe en bin/." }
          } catch {
            Write-Host "ERROR empaquetando libimobiledevice: $_"
          }

      - name: Instalar dependencias
        run: npm install

      - name: Generar instalador (.exe)
        run: npm run dist

      - name: Subir el instalador como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: BAYOL-Diagnostic-Engine-Windows
          path: bde/dist/*.exe
          if-no-files-found: error

      - name: Publicar Release con enlace fijo (para compartir)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'bde-latest' }}
          name: BAYOL Diagnostic Engine (Windows)
          body: |
            Instalador de BAYOL Diagnostic Engine para Windows.
            Descarga el archivo .exe de abajo, ejecútalo e instálalo.
          files: bde/dist/*.exe
